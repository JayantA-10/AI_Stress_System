{% extends "base.html" %}
{% block title %}Register — StressAI{% endblock %}
{% block content %}
<div class="auth-wrap">
  <div class="auth-card card">
    <h2>Create account</h2>
    <p class="sub">Join StressAI to track your academic wellbeing</p>

    {# ── Google Sign-Up Button ── #}
    <a href="{{ url_for('google_login') }}" class="btn-google">
      <svg width="18" height="18" viewBox="0 0 48 48" style="flex-shrink:0">
        <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
        <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
        <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
        <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.35-8.16 2.35-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
      </svg>
      Sign up with Google <span style="font-size:0.75rem; opacity:0.7; margin-left:0.2rem">(Recommended)</span>
    </a>

    <div class="divider"><span>or register manually</span></div>

    <form method="POST">
      <div class="form-group">
        <label>Username</label>
        <input type="text" name="username" required placeholder="Choose a username" autofocus />
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" name="email" required placeholder="your@email.com" />
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" name="password" required placeholder="Create a password" />
      </div>
      <div class="form-group">
        <label>Account Type</label>
        <select name="role">
          <option value="student">Student</option>
          <option value="counselor">Counselor</option>
        </select>
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%">Create Account</button>
    </form>

    <div class="auth-footer">
      Already registered? <a href="{{ url_for('login') }}">Sign in</a>
    </div>
  </div>
</div>

<style>
.btn-google {
  display: flex; align-items: center; justify-content: center;
  gap: 0.65rem; width: 100%; padding: 0.6rem 1rem;
  border: 1.5px solid var(--border); border-radius: 8px;
  background: white; color: var(--text); font-size: 0.88rem;
  font-weight: 500; font-family: inherit; text-decoration: none;
  cursor: pointer; transition: all 0.15s; margin-bottom: 1rem;
}
.btn-google:hover {
  border-color: #4285F4; background: #f8faff; color: var(--text);
  text-decoration: none; box-shadow: 0 1px 6px rgba(66,133,244,0.15);
}
.divider {
  display: flex; align-items: center; gap: 0.75rem;
  margin: 0.25rem 0 1rem; color: var(--muted); font-size: 0.78rem;
}
.divider::before, .divider::after {
  content: ''; flex: 1; height: 1px; background: var(--border);
}
</style>
{% endblock %}
